name: OmniAgent Task Runner

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── Trigger when an issue is labeled "agent-task" ──────────────────────────
  dispatch-agent-task:
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'agent-task') ||
      (github.event_name == 'issue_comment' &&
       startsWith(github.event.comment.body, '@OmniAgent'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract task from issue / comment
        id: extract
        env:
          BODY: ${{ github.event.issue.body || github.event.comment.body }}
        run: |
          echo "task<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post acknowledgment comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: "🤖 **OmniAgent** has received your task and is processing it…"
            });

  # ── Lint & test on every PR ────────────────────────────────────────────────
  ci-on-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: |
          pip install flake8 --quiet
          flake8 . --max-line-length=120 --exclude=.git,__pycache__,venv \
            --per-file-ignores="tests/*:E501"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── Nightly health check ───────────────────────────────────────────────────
  nightly-health:
    runs-on: ubuntu-latest
    schedule:
      # Runs at 02:00 UTC every day
      - cron: "0 2 * * *"
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt --quiet
      - run: python efficiency_check.py --dry-run || true
