<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Jacky Hub — Command Center</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0a0e27">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #0a0e27;
  --bg2:       #0f1535;
  --bg3:       #1a2040;
  --border:    rgba(0,212,255,.18);
  --accent:    #00d4ff;
  --accent2:   #0099ff;
  --text:      #e0e8ff;
  --muted:     #7090b0;
  --danger:    #ef4444;
  --warn:      #f59e0b;
  --ok:        #10b981;
  --panel-w:   260px;
  --stats-w:   220px;
  --radius:    12px;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 18px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  height: 52px;
}
.topbar .logo {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .5px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar .logo svg { width: 22px; height: 22px; }
.topbar .sep { width: 1px; height: 24px; background: var(--border); }
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  padding: 5px 10px;
  border-radius: 6px;
  transition: background .15s, color .15s;
}
.nav-links a:hover, .nav-links a.active {
  background: rgba(0,212,255,.1);
  color: var(--accent);
}
.topbar .spacer { flex: 1; }
#comms-btn {
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
}
#comms-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,212,255,.08);
}
#active-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--ok);
  box-shadow: 0 0 6px var(--ok);
  display: inline-block;
  margin-right: 4px;
}

/* ── MAIN LAYOUT ── */
.main {
  display: grid;
  grid-template-columns: var(--panel-w) 1fr var(--stats-w);
  flex: 1;
  overflow: hidden;
}

/* ── SQUAD PANEL ── */
.squad-panel {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 14px 0;
}
.squad-panel::-webkit-scrollbar { width: 4px; }
.squad-panel::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

.squad-section { margin-bottom: 6px; }
.squad-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
}
.squad-header:hover { color: var(--text); }
.squad-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.squad-toggle {
  margin-left: auto;
  font-size: 9px;
  transition: transform .2s;
}
.squad-section.collapsed .squad-bots { display: none; }
.squad-section.collapsed .squad-toggle { transform: rotate(-90deg); }

.bot-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 16px 7px 26px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 0;
  transition: background .15s;
  position: relative;
}
.bot-item:hover { background: rgba(255,255,255,.04); }
.bot-item.active {
  background: rgba(0,212,255,.08);
  color: var(--accent);
}
.bot-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.bot-avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
  color: #fff;
}
.bot-role {
  font-size: 9px;
  color: var(--muted);
  margin-left: auto;
}

.squad-action {
  display: flex;
  gap: 6px;
  padding: 6px 16px 10px 26px;
}
.squad-action button {
  flex: 1;
  font-size: 10px;
  padding: 4px 6px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}
.squad-action button:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.claude-code-section {
  margin-top: auto;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.claude-code-btn {
  width: 100%;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid rgba(236,72,153,.3);
  background: rgba(236,72,153,.06);
  color: #ec4899;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all .2s;
}
.claude-code-btn:hover { border-color: #ec4899; background: rgba(236,72,153,.12); }
.claude-code-btn.locked { opacity: .45; cursor: not-allowed; }
.cc-badge {
  margin-left: auto;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  background: rgba(236,72,153,.2);
}

/* ── CHAT FRAME ── */
.chat-frame {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}
.chat-frame iframe {
  flex: 1;
  border: none;
  width: 100%;
  height: 100%;
}

/* ── STATS PANEL ── */
.stats-panel {
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 14px 12px;
  gap: 12px;
  overflow-y: auto;
}
.stats-panel::-webkit-scrollbar { width: 3px; }
.stats-panel::-webkit-scrollbar-thumb { background: var(--bg3); }

.stat-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
}
.stat-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--muted);
  margin-bottom: 6px;
}
.stat-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.stat-value.ok   { color: var(--ok); }
.stat-value.warn { color: var(--warn); }
.stat-value.bad  { color: var(--danger); }
.stat-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}

.stat-bar-wrap {
  background: rgba(255,255,255,.06);
  border-radius: 3px;
  height: 4px;
  margin-top: 8px;
  overflow: hidden;
}
.stat-bar {
  height: 100%;
  border-radius: 3px;
  background: var(--accent);
  transition: width .4s;
}
.stat-bar.warn { background: var(--warn); }
.stat-bar.bad  { background: var(--danger); }

.stats-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .8px;
}
.sas-link {
  display: block;
  text-align: center;
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
  transition: background .15s;
  margin-top: auto;
}
.sas-link:hover { background: rgba(0,212,255,.08); }

.models-list { display: flex; flex-direction: column; gap: 4px; }
.model-chip {
  font-size: 10px;
  padding: 3px 7px;
  border-radius: 4px;
  background: rgba(0,212,255,.08);
  color: var(--accent);
  display: flex;
  justify-content: space-between;
}
.model-chip .model-state { color: var(--ok); font-size: 9px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
    </svg>
    JACKY HUB
  </div>
  <div class="sep"></div>
  <nav class="nav-links">
    <a href="/hub" class="active">Hub</a>
    <a href="/chat">Chat</a>
    <a href="/dashboard">SAS</a>
  </nav>
  <div class="spacer"></div>
  <span id="active-dot"></span>
  <button id="comms-btn" onclick="toggleComms()">⚡ SAS Comms</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SQUAD PANEL -->
  <div class="squad-panel" id="squad-panel">
    <div id="squad-list">
      <div style="padding:16px;color:var(--muted);font-size:12px;">Loading squads…</div>
    </div>
    <div class="claude-code-section">
      <button class="claude-code-btn locked" id="claude-code-btn" onclick="activateClaudeCode()">
        <span>🤖</span>
        Claude Code
        <span class="cc-badge" id="cc-badge">SAS-LOCKED</span>
      </button>
    </div>
  </div>

  <!-- CHAT IFRAME -->
  <div class="chat-frame">
    <iframe id="chat-iframe" src="/chat" title="Jacky Chat" allow="clipboard-write"></iframe>
  </div>

  <!-- STATS PANEL -->
  <div class="stats-panel">
    <div class="stats-title">System</div>

    <div class="stat-card">
      <div class="stat-label">CPU</div>
      <div class="stat-value" id="stat-cpu">—</div>
      <div class="stat-bar-wrap"><div class="stat-bar" id="bar-cpu" style="width:0%"></div></div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Memory</div>
      <div class="stat-value" id="stat-mem">—</div>
      <div class="stat-bar-wrap"><div class="stat-bar" id="bar-mem" style="width:0%"></div></div>
    </div>

    <div class="stat-card">
      <div class="stat-label">GPU Temp</div>
      <div class="stat-value" id="stat-gpu-temp">—</div>
      <div class="stat-sub" id="stat-gpu-load">load —</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Disk E:</div>
      <div class="stat-value" id="stat-disk">—</div>
    </div>

    <div class="stats-title" style="margin-top:4px;">Local Models</div>
    <div class="models-list" id="models-list">
      <div style="color:var(--muted);font-size:11px;">Loading…</div>
    </div>

    <a href="/dashboard" class="sas-link" target="_blank">Open Full SAS ↗</a>
  </div>

</div>

<script>
const API = '/api';
let sasCommsActive = false;
let activeSquad = localStorage.getItem('hub_active_squad') || 'coding';
let activeBot = localStorage.getItem('hub_active_bot') || 'lead';

// ── SQUAD PANEL ──────────────────────────────────────────────────────

async function loadSquads() {
  try {
    const r = await fetch(`${API}/squads`);
    const data = await r.json();
    renderSquads(data.squads || {});
  } catch(e) {
    document.getElementById('squad-list').innerHTML =
      `<div style="padding:14px;color:var(--muted);font-size:11px;">Squads unavailable</div>`;
  }
}

function renderSquads(squads) {
  const container = document.getElementById('squad-list');
  const squadColors = { coding: '#00d4ff', security: '#ef4444', archivist: '#8b5cf6' };
  let html = '';
  for (const [squad, info] of Object.entries(squads)) {
    const color = squadColors[squad] || '#888';
    const isCollapsed = localStorage.getItem(`squad_${squad}_collapsed`) === '1' ? 'collapsed' : '';
    html += `
      <div class="squad-section ${isCollapsed}" id="section-${squad}">
        <div class="squad-header" onclick="toggleSection('${squad}')">
          <span class="squad-dot" style="background:${color}"></span>
          ${squad.toUpperCase()} (${info.count})
          <span class="squad-toggle">▾</span>
        </div>
        <div class="squad-bots">`;
    for (const bot of (info.bots || [])) {
      const initials = bot.name.slice(0,2).toUpperCase();
      const isActive = bot.id === activeBot ? 'active' : '';
      html += `
          <div class="bot-item ${isActive}" id="bot-${bot.id}" onclick="selectBot('${squad}','${bot.id}')">
            <div class="bot-avatar" style="background:${bot.color || color}">${initials}</div>
            ${bot.name}
            <span class="bot-role">${bot.role}</span>
          </div>`;
    }
    html += `
        </div>
        <div class="squad-action">
          <button onclick="setSquad('${squad}','ask')">Ask Lead</button>
          <button onclick="setSquad('${squad}','discuss')">All Reply</button>
        </div>
      </div>`;
  }
  container.innerHTML = html;
}

function toggleSection(squad) {
  const el = document.getElementById(`section-${squad}`);
  el.classList.toggle('collapsed');
  localStorage.setItem(`squad_${squad}_collapsed`, el.classList.contains('collapsed') ? '1' : '0');
}

function selectBot(squad, botId) {
  activeSquad = squad;
  activeBot = botId;
  localStorage.setItem('hub_active_squad', squad);
  localStorage.setItem('hub_active_bot', botId);
  document.querySelectorAll('.bot-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`bot-${botId}`);
  if (el) el.classList.add('active');
  // Notify chat iframe of selection
  notifyChat({ type: 'SQUAD_SELECT', squad, botId, mode: 'ask' });
}

function setSquad(squad, mode) {
  activeSquad = squad;
  localStorage.setItem('hub_active_squad', squad);
  notifyChat({ type: 'SQUAD_SELECT', squad, botId: null, mode });
}

function notifyChat(msg) {
  const iframe = document.getElementById('chat-iframe');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage(msg, '*');
  }
}

// ── SAS COMMS (Claude Code gating) ──────────────────────────────────

async function toggleComms() {
  if (sasCommsActive) return; // Can't deactivate mid-session
  try {
    const r = await fetch(`${API}/sas-comms/activate`, { method: 'POST' });
    const data = await r.json();
    if (data.status === 'active') {
      sasCommsActive = true;
      document.getElementById('comms-btn').classList.add('active');
      document.getElementById('comms-btn').textContent = '✅ SAS Comms ON';
      // Unlock Claude Code button
      const ccBtn = document.getElementById('claude-code-btn');
      ccBtn.classList.remove('locked');
      document.getElementById('cc-badge').textContent = 'UNLOCKED';
    }
  } catch(e) { console.error('SAS comms activate failed', e); }
}

function activateClaudeCode() {
  if (!sasCommsActive) {
    alert('Claude Code requires SAS Comms to be active.\nClick "SAS Comms" in the top bar first.');
    return;
  }
  notifyChat({ type: 'ACTIVATE_CLAUDE_CODE' });
}

// ── STATS POLLING ────────────────────────────────────────────────────

function barClass(pct) { return pct > 85 ? 'bad' : pct > 70 ? 'warn' : ''; }
function gpuClass(t) { return t > 85 ? 'bad' : t > 75 ? 'warn' : 'ok'; }

async function pollStats() {
  try {
    const r = await fetch(`${API}/status`);
    const d = await r.json();
    const cpu = d.cpu || 0;
    const mem = d.memory || 0;
    const disk = d.disk_free || '—';

    const cpuEl = document.getElementById('stat-cpu');
    cpuEl.textContent = cpu + '%';
    cpuEl.className = 'stat-value ' + barClass(cpu);
    const barCpu = document.getElementById('bar-cpu');
    barCpu.style.width = cpu + '%';
    barCpu.className = 'stat-bar ' + barClass(cpu);

    const memEl = document.getElementById('stat-mem');
    memEl.textContent = mem + '%';
    memEl.className = 'stat-value ' + barClass(mem);
    const barMem = document.getElementById('bar-mem');
    barMem.style.width = mem + '%';
    barMem.className = 'stat-bar ' + barClass(mem);

    document.getElementById('stat-disk').textContent = disk;

    const gpu = d.gpu || {};
    if (gpu.available) {
      const t = gpu.temp_c || 0;
      const gpuEl = document.getElementById('stat-gpu-temp');
      gpuEl.textContent = t + '°C';
      gpuEl.className = 'stat-value ' + gpuClass(t);
      document.getElementById('stat-gpu-load').textContent =
        `load ${gpu.load_percent || 0}%  |  ${gpu.mem_used_mb || 0}/${gpu.mem_total_mb || 0} MB`;
    }
  } catch(e) { /* server not up */ }
}

async function pollModels() {
  try {
    const r = await fetch(`${API}/models`);
    const d = await r.json();
    const list = document.getElementById('models-list');
    const models = d.online || [];
    if (!models.length) {
      list.innerHTML = '<div style="color:var(--muted);font-size:11px;">No models online</div>';
      return;
    }
    list.innerHTML = models.slice(0, 6).map(m => `
      <div class="model-chip">
        <span>${m.name.split(':')[0]}</span>
        <span class="model-state">●</span>
      </div>`).join('');
  } catch(e) {}
}

// ── INIT ─────────────────────────────────────────────────────────────

async function checkCommsStatus() {
  try {
    const r = await fetch(`${API}/sas-comms/status`);
    const d = await r.json();
    if (d.active) {
      sasCommsActive = true;
      document.getElementById('comms-btn').classList.add('active');
      document.getElementById('comms-btn').textContent = '✅ SAS Comms ON';
      document.getElementById('claude-code-btn').classList.remove('locked');
      document.getElementById('cc-badge').textContent = 'UNLOCKED';
    }
  } catch(e) {}
}

loadSquads();
checkCommsStatus();
pollStats();
pollModels();
setInterval(pollStats, 8000);
setInterval(pollModels, 30000);
</script>
</body>
</html>
